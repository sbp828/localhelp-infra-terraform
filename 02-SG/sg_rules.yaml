- name: SG Rules

  sg:
    - expense-dev-db
    - expense-dev-backend
    - expense-dev-frontend
    - expense-dev-bastion
    - expense-dev-ansible

  db:
    - name: db_backend
      desc: db accepting backend connections
      source: backend
      port: 3306

    - name: db_bastion
      desc: db accepting bastion host connections
      source: bastion
      port: 22

  backend:
    - name: backend_frontend
      desc: backend accepting frontend connections
      source: frontend
      port: 8080

    - name: backend_bastion
      desc: backend accepting bastion connections
      source: bastion
      port: 22

    - name: backend_ansible
      desc: backend accepting ansible connections
      source: ansible
      port: 22

  frontend:
    - name: frontend_public
      desc: frontend accepting public connections
      source: public
      port: 80

    - name: frontend_bastion
      desc: frontend accepting bastion connections
      source: bastion
      port: 22

    - name: frontend_ansible
      desc: frontend accepting ansible connections
      source: ansible
      port: 22

  bastion:
    - name: bastion_public
      desc: bastion accepting public connections
      source: public
      port: 22

  ansible:
    - name: ansible_public
      desc: ansible accepting public connections
      source: public
      port: 22